dataset:
  name: stanford_cars
  manifest_dir: data/stanford_cars
  train_manifest: data/stanford_cars/train_manifest.jsonl
  val_manifest: data/stanford_cars/val_manifest.jsonl
  test_manifest: data/stanford_cars/test_manifest.jsonl
  annotation_dir: annotations/stanford_cars
  precomputed_target_dir: data/stanford_cars/precomputed_targets

concepts:
  raw_file: concept_files/stanford_cars_concepts_raw.txt
  filtered_file: concept_files/stanford_cars_concepts_filtered.txt
  metadata_json: data/stanford_cars/concept_metadata.json

model:
  backbone: resnet50
  concept_head: multiscale_conv45
  input_size: 224
  resize_short_edge: 256
  mask_h: 14
  mask_w: 14
  residual_alpha: 0.2
  residual_spatial_pooling: lse

training:
  batch_size: 128
  epochs: 10
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0001
  global_pos_weight: 1.0
  loss_global_w: 1.0
  loss_mask_w: 1.0
  spatial_target_mode: soft_box
  spatial_loss_mode: soft_align
  train_random_transforms: false

glm:
  nec_values: [5, 10, 15, 20, 25, 30]
  saga_lam: 0.0005
  saga_n_iters: 200
  saga_step_size: 0.02

localization:
  map_normalization: concept_zscore_minmax
  activation_thresholds: [0.3, 0.5, 0.7, 0.9]
