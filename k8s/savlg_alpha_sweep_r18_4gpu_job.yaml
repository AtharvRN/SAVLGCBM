apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-alpha-sweep-r18-2gpu
  namespace: wenglab-interpretable-ai
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: savlg-alpha-sweep-r18-2gpu
    spec:
      restartPolicy: Never
      containers:
      - name: main
        image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-devel
        command:
        - bash
        - -lc
        args:
        - |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export OMP_NUM_THREADS=1
          export MKL_NUM_THREADS=1
          export OPENBLAS_NUM_THREADS=1
          export NUMEXPR_NUM_THREADS=1
          export PYTHONUNBUFFERED=1

          source /opt/conda/etc/profile.d/conda.sh || true

          LOG_DIR=/workspace/SAVLGCBM/logs
          SAVE_ROOT=/workspace/SAVLGCBM/saved_models/alpha_sweep_r18
          mkdir -p "$LOG_DIR" "$SAVE_ROOT"

          apt-get update || true
          apt-get install -y --no-install-recommends git curl wget rsync libgl1 libglib2.0-0 || true

          cd /workspace/SAVLGCBM

          bash scripts/pod_bootstrap_cbm.sh \
            2>&1 | tee "$LOG_DIR/bootstrap_cbm_savlg_alpha_sweep_2gpu.log"

          source /opt/conda/etc/profile.d/conda.sh
          conda activate cbm

          export PYTHONPATH=/workspace/SAVLGCBM

          run_alpha() {
            local gpu="$1"
            local alpha="$2"
            local tag
            tag="$(echo "$alpha" | tr '.' 'p')"
            local run_dir="$SAVE_ROOT/alpha_${tag}"
            local log_file="$LOG_DIR/train_savlg_alpha_${tag}_2gpu_job.log"

            mkdir -p "$run_dir"
            echo "[$(date)] starting alpha=$alpha on gpu=$gpu run_dir=$run_dir" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_2gpu.log"

            CUDA_VISIBLE_DEVICES="$gpu" python -u train_cbm.py \
              --config /workspace/SAVLGCBM/configs/unified/cub_savlg_cbm_repro_oldbest_conv5_alpha010_outside_v1.json \
              --savlg_residual_spatial_alpha "$alpha" \
              --cbl_batch_size 128 \
              --num_workers 24 \
              --save_dir "$run_dir" \
              2>&1 | tee "$log_file"

            local exit_code=$?
            echo "[$(date)] finished alpha=$alpha on gpu=$gpu exit=$exit_code" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_2gpu.log"
            return "$exit_code"
          }

          run_alpha 0 0 &
          pid0=$!
          run_alpha 1 0.05 &
          pid1=$!

          wait "$pid0"
          wait "$pid1"

          run_alpha 0 0.1 &
          pid2=$!
          run_alpha 1 0.2 &
          pid3=$!

          wait "$pid2"
          wait "$pid3"

          run_alpha 0 0.4 &
          pid4=$!
          run_alpha 1 0.6 &
          pid5=$!

          wait "$pid4"
          wait "$pid5"

          run_alpha 0 0.8 &
          pid6=$!
          run_alpha 1 1.0 &
          pid7=$!

          wait "$pid6"
          wait "$pid7"
        resources:
          limits:
            cpu: 60
            memory: 96Gi
            nvidia.com/gpu: 2
          requests:
            cpu: 60
            memory: 96Gi
            nvidia.com/gpu: 2
        volumeMounts:
        - name: atharv-rwx-storage-1ti
          mountPath: /workspace
        - name: dev-shm
          mountPath: /dev/shm
      volumes:
      - name: atharv-rwx-storage-1ti
        persistentVolumeClaim:
          claimName: atharv-rwx-storage-1ti
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 96Gi
