apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-r50-mm-exact-best-train-nec-loc
  namespace: wenglab-interpretable-ai
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: savlg-r50-mm-exact-best-train-nec-loc
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A10
      containers:
      - name: main
        image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-devel
        command:
        - bash
        - -lc
        args:
        - |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export OMP_NUM_THREADS=1
          export MKL_NUM_THREADS=1
          export OPENBLAS_NUM_THREADS=1
          export NUMEXPR_NUM_THREADS=1
          export PYTHONUNBUFFERED=1

          source /opt/conda/etc/profile.d/conda.sh || true

          LOG_DIR=/workspace/SAVLGCBM/logs
          RUN_ROOT=/workspace/SAVLGCBM/saved_models/savlg_r50_mm_exact_best
          RESULT_ROOT=/workspace/SAVLGCBM/results/savlg_r50_mm_exact_best
          BASE_CONFIG=/workspace/SAVLGCBM/configs/unified/cub_savlg_cbm_vlgwarm_resnet50_cub_mm_residual_alpha020_softalign_outside025_conv5only_b32_v1.json
          CONFIG=/tmp/cub_savlg_cbm_r50_mm_exact_best.json
          mkdir -p "$LOG_DIR" "$RUN_ROOT" "$RESULT_ROOT"

          apt-get update || true
          apt-get install -y --no-install-recommends git curl wget rsync libgl1 libglib2.0-0 || true

          cd /workspace/SAVLGCBM

          bash scripts/pod_bootstrap_cbm.sh \
            2>&1 | tee "$LOG_DIR/bootstrap_cbm_savlg_r50_mm_exact_best.log"

          source /opt/conda/etc/profile.d/conda.sh
          conda activate cbm

          export PYTHONPATH=/workspace/SAVLGCBM
          mkdir -p /root/.torch/models
          echo "[$(date)] warming resnet50_cub_mm backbone cache" | tee -a "$LOG_DIR/savlg_r50_mm_exact_best_queue.log"
          python - <<'PY'
          from data import utils as data_utils
          _model, _ = data_utils.get_target_model("resnet50_cub_mm", "cpu")
          print("warmed resnet50_cub_mm")
          PY

          python - <<'PY'
          import json
          from pathlib import Path
          base = Path("/workspace/SAVLGCBM/configs/unified/cub_savlg_cbm_vlgwarm_resnet50_cub_mm_residual_alpha020_softalign_outside025_conv5only_b32_v1.json")
          out = Path("/tmp/cub_savlg_cbm_r50_mm_exact_best.json")
          cfg = json.loads(base.read_text())
          cfg["savlg_spatial_branch_mode"] = "multiscale_conv45"
          cfg["savlg_residual_spatial_alpha"] = 0.2
          cfg["savlg_freeze_global_head"] = False
          cfg["savlg_coverage_w"] = 0.25
          cfg["cbl_batch_size"] = 32
          cfg["annotation_dir"] = "/workspace/SAVLGCBM/annotations"
          cfg["implementation_status"] = "r50_mm_exact_best_dual_multiscale_conv45_alpha020_outside025_cov025_v1"
          out.write_text(json.dumps(cfg, indent=2) + "\n")
          print(f"wrote {out}")
          PY

          CUDA_VISIBLE_DEVICES=0 python -u train_cbm.py \
            --config "$CONFIG" \
            --save_dir "$RUN_ROOT" \
            2>&1 | tee "$LOG_DIR/train_savlg_r50_mm_exact_best.log"

          RUN_DIR="$(find "$RUN_ROOT" -maxdepth 1 -mindepth 1 -type d | sort | tail -n 1)"
          if [ -z "$RUN_DIR" ]; then
            echo "no nested run dir under $RUN_ROOT" | tee -a "$LOG_DIR/savlg_r50_mm_exact_best_queue.log"
            exit 1
          fi

          CUDA_VISIBLE_DEVICES=0 python -u sparse_evaluation.py \
            --load_path "$RUN_DIR" \
            2>&1 | tee "$LOG_DIR/nec_savlg_r50_mm_exact_best.log"

          CUDA_VISIBLE_DEVICES=0 python -u /workspace/SAVLGCBM/scripts/evaluate_native_spatial_maps.py \
            --load_paths "$RUN_DIR" \
            --names "savlg_r50_mm_exact_best" \
            --annotation_dir /workspace/SAVLGCBM/annotations \
            --dataset cub \
            --split test \
            --batch_size 32 \
            --num_workers 8 \
            --annotation_threshold 0.15 \
            --activation_thresholds 0.05,0.1,0.15,0.2,0.25,0.3,0.35,0.4,0.45,0.5,0.55,0.6,0.65,0.7,0.75,0.8,0.85,0.9,0.95 \
            --threshold_mode fixed \
            --map_source native \
            --map_normalization concept_zscore_minmax \
            --eval_subset_mode gt_present \
            --box_iou_thresholds 0.1,0.3,0.5,0.7 \
            --concept_mode intersection \
            --output "$RESULT_ROOT/native_savlg_r50_mm_exact_best.json" \
            2>&1 | tee "$LOG_DIR/native_savlg_r50_mm_exact_best.log"
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "24"
            memory: 48Gi
          limits:
            nvidia.com/gpu: 1
            cpu: "24"
            memory: 48Gi
        volumeMounts:
        - name: atharv-rwx-storage-1ti
          mountPath: /workspace
        - name: dev-shm
          mountPath: /dev/shm
      volumes:
      - name: atharv-rwx-storage-1ti
        persistentVolumeClaim:
          claimName: atharv-rwx-storage-1ti
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 48Gi
