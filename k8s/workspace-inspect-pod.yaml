apiVersion: v1
kind: Pod
metadata:
  name: workspace-inspect-pod
  namespace: wenglab-interpretable-ai
spec:
  restartPolicy: Never
  containers:
  - name: main
    image: python:3.10-slim
    command:
    - /bin/sh
    - -lc
    - sleep infinity
    volumeMounts:
    - name: workspace
      mountPath: /workspace
  volumes:
  - name: workspace
    persistentVolumeClaim:
      claimName: atharv-rwx-storage-1ti
