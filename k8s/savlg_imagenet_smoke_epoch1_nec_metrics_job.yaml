apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-imagenet-smoke-epoch1-nec-metrics
  namespace: wenglab-interpretable-ai
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: savlg-imagenet-smoke-epoch1-nec-metrics
    spec:
      restartPolicy: Never
      containers:
      - name: main
        image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-devel
        command: ["bash", "-lc"]
        args:
        - |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export OMP_NUM_THREADS=1
          export MKL_NUM_THREADS=1
          export OPENBLAS_NUM_THREADS=1
          export NUMEXPR_NUM_THREADS=1
          export PYTHONUNBUFFERED=1

          export CBM_MIN_IMAGE_BYTES=1024
          export CBM_FALLBACK_IMAGE_SIZE=224
          export IMAGENET_TRAIN_ROOT=/scratch/imagenet_extract_runs_fresh/20260420_135422/train

          export RUN_DIR=/scratch/savlgcbm_artifacts/saved_models_imagenet_smoke/savlg_cbm_imagenet_2026_04_21_04_26_10
          export OUT_JSON="$RUN_DIR/imagenet_smoke_nec_metrics.json"

          apt-get update || true
          apt-get install -y --no-install-recommends git curl wget libgl1 libglib2.0-0 || true

          python -m pip install --upgrade pip
          python -m pip install \
            numpy==1.26.4 tqdm loguru pytorchcv ftfy regex scikit-learn tensorboard opencv-python-headless==4.11.0.86

          cd /workspace/SAVLGCBM
          export PYTHONPATH=/workspace/SAVLGCBM

          python - <<'PY'
          import argparse
          import json
          import os
          from pathlib import Path

          import torch
          from torch.utils.data import DataLoader
          from tqdm import tqdm

          from methods.savlg import (
              create_savlg_splits,
              build_savlg_concept_layer,
              forward_savlg_backbone,
              forward_savlg_concept_layer,
              compute_savlg_concept_logits,
          )

          run_dir = os.environ["RUN_DIR"]
          out_json = os.environ["OUT_JSON"]

          with open(Path(run_dir) / "args.txt", "r") as f:
              args = argparse.Namespace(**json.load(f))
          args.device = "cuda" if torch.cuda.is_available() else "cpu"
          args.use_activation_cache = False

          _, _, train_ds, val_ds, test_ds, backbone = create_savlg_splits(args)

          with open(Path(run_dir) / "concepts.txt", "r") as f:
              concepts = [c for c in f.read().split("\n") if c]
          concept_layer = build_savlg_concept_layer(args, backbone, len(concepts))
          concept_layer.load_state_dict(torch.load(Path(run_dir) / "concept_layer.pt", map_location=args.device))
          concept_layer.to(args.device).eval()

          mean = torch.load(Path(run_dir) / "proj_mean.pt", map_location="cpu")
          std = torch.load(Path(run_dir) / "proj_std.pt", map_location="cpu")

          def eval_with_weights(ds, W: torch.Tensor, b: torch.Tensor, topk: int = 5):
              W = W.to(args.device)
              b = b.to(args.device)
              loader = DataLoader(ds, batch_size=args.cbl_batch_size, shuffle=False, num_workers=args.num_workers)
              total = 0
              top1 = 0
              topk_ok = 0
              with torch.no_grad():
                  for images, target in tqdm(loader, desc="eval", leave=False):
                      images = images.to(args.device)
                      target = target.to(args.device)
                      feats = forward_savlg_backbone(backbone, images, args)
                      global_out, spatial_maps = forward_savlg_concept_layer(concept_layer, feats)
                      _, _, final_logits = compute_savlg_concept_logits(global_out, spatial_maps, args)
                      final_logits = (final_logits - mean.to(args.device)) / std.to(args.device)
                      logits = final_logits @ W.T + b
                      pred1 = logits.argmax(dim=-1)
                      top1 += int((pred1 == target).sum().item())
                      if topk > 1:
                          predk = logits.topk(topk, dim=-1).indices
                          topk_ok += int((predk == target[:, None]).any(dim=1).sum().item())
                      total += int(target.numel())
              return {"n": total, "top1": top1 / max(total, 1), f"top{topk}": topk_ok / max(total, 1)}

          # Full model weights
          W_full = torch.load(Path(run_dir) / "W_g.pt", map_location="cpu")
          b_full = torch.load(Path(run_dir) / "b_g.pt", map_location="cpu")

          nec_levels = [5, 10, 15, 20, 25, 30]
          weights = {"full": (W_full, b_full)}
          for k in nec_levels:
              weights[f"NEC@{k}"] = (
                  torch.load(Path(run_dir) / f"W_g@NEC={k}.pt", map_location="cpu"),
                  torch.load(Path(run_dir) / f"b_g@NEC={k}.pt", map_location="cpu"),
              )

          # Evaluate on the split used as "test" for this smoke run (test_ds == val_ds).
          results = {}
          for name, (W, b) in weights.items():
              results[name] = eval_with_weights(test_ds, W, b, topk=5)

          accs = [results[f"NEC@{k}"]["top1"] for k in nec_levels]
          summary = {
              "run_dir": run_dir,
              "test_split_n": int(results["full"]["n"]),
              "full_top1": results["full"]["top1"],
              "full_top5": results["full"]["top5"],
              "nec_levels": nec_levels,
              "nec_top1": {str(k): results[f"NEC@{k}"]["top1"] for k in nec_levels},
              "nec_avgacc": float(sum(accs) / max(len(accs), 1)),
              "nec_acc_at_30": results["NEC@30"]["top1"],
          }

          out = {"summary": summary, "per_setting": results}
          with open(out_json, "w") as f:
              json.dump(out, f, indent=2)
          print("WROTE", out_json)
          print(json.dumps(summary, indent=2))
          PY
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "12"
            memory: 48Gi
          limits:
            nvidia.com/gpu: 1
            cpu: "12"
            memory: 48Gi
        volumeMounts:
        - name: atharv-rwx-storage-1ti
          mountPath: /workspace
        - name: atharv-rwo-scratch-2ti
          mountPath: /scratch
        - name: dev-shm
          mountPath: /dev/shm
      volumes:
      - name: atharv-rwx-storage-1ti
        persistentVolumeClaim:
          claimName: atharv-rwx-storage-1ti
      - name: atharv-rwo-scratch-2ti
        persistentVolumeClaim:
          claimName: atharv-rwo-scratch-2ti
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
