apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-imagenet-local-1ep
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      # Pin to a specific node by hostname label (Gatekeeper blocks nodeName).
      nodeSelector:
        kubernetes.io/hostname: hcc-gpengine-shor-c5303.unl.edu

      # This node appears with an issue taint in the UI. Tolerate it explicitly.
      tolerations:
        - key: "nautilus.io/issue"
          operator: "Equal"
          value: "1663"
          effect: "NoSchedule"

      # If your cluster labels A100 nodes, uncomment/adjust the selector.
      # nodeSelector:
      #   nvidia.com/gpu.product: NVIDIA-A100-SXM4-80GB
      #
      # High-bandwidth hint (Nautilus): some nodes use label autilus.io/network=100000 (100GbE).
      # nodeSelector:
      #   autilus.io/network: "100000"

      volumes:
        # Node-local scratch (fast). This is NOT persistent.
        - name: data
          emptyDir:
            sizeLimit: 500Gi
        - name: work
          emptyDir: {}
        # Persistent source for annotation tarballs.
        - name: annotations-src
          persistentVolumeClaim:
            claimName: imagenet-annotations-pvc
        # Persistent destination for run artifacts (checkpoints/logs).
        - name: artifacts-pvc
          persistentVolumeClaim:
            claimName: atharv-rwo-scratch-2ti
        - name: dev-shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        # Optional: mount Kaggle token as a secret at /secrets/kaggle.json
        # Create it with:
        #   kubectl -n <ns> create secret generic kaggle-json --from-file=kaggle.json=$HOME/.kaggle/kaggle.json
        - name: kaggle-json
          secret:
            secretName: kaggle-json
            optional: true

      initContainers:
        - name: clone-repo
          image: alpine/git:2.45.2
          command: ["sh", "-lc"]
          env:
            - name: REPO_URL
              value: "https://github.com/AtharvRN/SAVLGCBM.git"
            - name: REPO_REF
              value: "imagenet-training"
          args:
            - |
              set -euo pipefail
              echo "[clone-repo] cloning ${REPO_URL} ref=${REPO_REF}"
              git clone --depth 1 --branch "${REPO_REF}" "${REPO_URL}" /work/SAVLGCBM
              echo "[clone-repo] commit $(git -C /work/SAVLGCBM rev-parse --short HEAD)"
              # Fail fast if we accidentally pulled a revision missing required ImageNet fixes.
              grep -q -- "savlg_stream_supervision" /work/SAVLGCBM/train_cbm.py
              grep -q -- "_safe_imagenet_pil_loader" /work/SAVLGCBM/data/utils.py
              grep -q -- "CBM_CONDA_ENV_FILE" /work/SAVLGCBM/scripts/pod_bootstrap_cbm.sh
              # The PRP stack often runs as a non-root user; make the repo and output dir writable.
              mkdir -p /work/out
              chmod 777 /work /work/out
              # `conda env create -f envs/cbm.yml` writes a temporary pip requirements file next to the YAML.
              # Ensure that path is writable for the non-root `train` container.
              chmod -R a+rX /work/SAVLGCBM
              chmod -R a+rwX /work/SAVLGCBM/envs
          volumeMounts:
            - name: work
              mountPath: /work
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

        - name: stage-data
          image: ubuntu:22.04
          command: ["bash", "-lc"]
          env:
            - name: KAGGLE_URL
              value: "https://www.kaggle.com/api/v1/datasets/download/mayurmadnani/imagenet-dataset"
          args:
            - |
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -y >/dev/null
              apt-get install -y --no-install-recommends ca-certificates curl jq unzip wget >/dev/null

              mkdir -p /data/root /data/datasets/imagenet/ILSVRC/Data/CLS-LOC
              # Ensure the main (non-root) training container can write annotations and receive kubectl cp uploads.
              chmod 777 /data/root

              if [[ ! -f /secrets/kaggle.json ]]; then
                echo "Missing /secrets/kaggle.json. Create secret kaggle-json (see YAML comment) and retry." >&2
                exit 2
              fi
              KAGGLE_KEY="$(jq -r .key /secrets/kaggle.json)"
              if [[ -z "${KAGGLE_KEY:-}" || "$KAGGLE_KEY" == "null" ]]; then
                echo "Could not read .key from /secrets/kaggle.json" >&2
                exit 2
              fi

              echo "[stage-data] downloading ImageNet zip (this can take a while)"
              wget -O /data/root/imagenet-dataset.zip \
                --header="Authorization: Bearer ${KAGGLE_KEY}" \
                --tries=50 --timeout=30 \
                "$KAGGLE_URL"

              echo "[stage-data] unzipping to /data/root (resume mode: unzip -n)"
              unzip -n -q /data/root/imagenet-dataset.zip -d /data/root
              rm -f /data/root/imagenet-dataset.zip

              echo "[stage-data] wiring expected torchvision-style paths"
              DATA_BASE=/data/root
              if [[ ! -d "${DATA_BASE}/train" || ! -d "${DATA_BASE}/val" ]]; then
                # Some Kaggle zips add a single top-level folder. Detect it.
                CANDIDATES=()
                while IFS= read -r -d '' d; do CANDIDATES+=("$d"); done < <(find "${DATA_BASE}" -mindepth 1 -maxdepth 1 -type d -print0)
                if [[ ${#CANDIDATES[@]} -eq 1 && -d "${CANDIDATES[0]}/train" && -d "${CANDIDATES[0]}/val" ]]; then
                  DATA_BASE="${CANDIDATES[0]}"
                else
                  echo "Could not find train/val dirs after unzip under /data/root. Contents:" >&2
                  ls -la /data/root >&2 || true
                  exit 3
                fi
              fi
              ln -sfn "${DATA_BASE}/train" /data/datasets/imagenet/ILSVRC/Data/CLS-LOC/train
              ln -sfn "${DATA_BASE}/val" /data/datasets/imagenet/ILSVRC/Data/CLS-LOC/ImageNet_val

              # Pre-create writable annotations directory on NVMe for the training container.
              mkdir -p /data/root/imagenet_annotations
              chmod 777 /data/root/imagenet_annotations

              echo "[stage-data] validating annotation tarballs on PVC"
              if [[ ! -f /annotations_src/imagenet_train.tar.gz || ! -f /annotations_src/imagenet_val.tar.gz ]]; then
                echo "Missing /annotations_src/imagenet_{train,val}.tar.gz in PVC imagenet-annotations-pvc" >&2
                ls -lah /annotations_src >&2 || true
                exit 10
              fi
              got_train="$(md5sum /annotations_src/imagenet_train.tar.gz | awk '{print $1}')"
              got_val="$(md5sum /annotations_src/imagenet_val.tar.gz | awk '{print $1}')"
              if [[ "$got_train" != "c93207b0f3dfa070afc2771099ad7b0a" ]]; then
                echo "MD5 mismatch for /annotations_src/imagenet_train.tar.gz: got=$got_train" >&2
                exit 11
              fi
              if [[ "$got_val" != "3c91c33f32146518d29450e279e2c2b6" ]]; then
                echo "MD5 mismatch for /annotations_src/imagenet_val.tar.gz: got=$got_val" >&2
                exit 11
              fi

              echo "[stage-data] extracting annotation tarballs from PVC to NVMe (/data/root/imagenet_annotations)"
              tar -xzf /annotations_src/imagenet_train.tar.gz -C /data/root/imagenet_annotations
              tar -xzf /annotations_src/imagenet_val.tar.gz -C /data/root/imagenet_annotations

              # Reserve a writable area on artifact PVC for run logs/checkpoints archived by train.
              mkdir -p /artifacts/savlg_imagenet_runs
              chmod 777 /artifacts/savlg_imagenet_runs

              echo "[stage-data] done (ImageNet + annotations staged on NVMe)"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: kaggle-json
              mountPath: /secrets
            - name: annotations-src
              mountPath: /annotations_src
            - name: artifacts-pvc
              mountPath: /artifacts
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
            limits:
              cpu: "4"
              memory: "16Gi"

      containers:
        - name: train
          image: ghcr.io/atharvrn/savlgcbm-cbm:pt222-cu121
          command: ["bash", "-lc"]
          env:
            - name: DATASET_FOLDER
              value: /data/datasets
            - name: OMP_NUM_THREADS
              value: "1"
            - name: MKL_NUM_THREADS
              value: "1"
            # Make the robust loader ignore tiny JPEGs instead of crashing.
            - name: CBM_MIN_IMAGE_BYTES
              value: "2048"
            # Optional: expected md5 checksums for the uploaded annotation tarballs.
            # Set these to make the job refuse to extract truncated uploads.
            - name: ANNOT_TRAIN_MD5
              value: "c93207b0f3dfa070afc2771099ad7b0a"
            - name: ANNOT_VAL_MD5
              value: "3c91c33f32146518d29450e279e2c2b6"
          args:
            - |
              set -euo pipefail
              cd /work/SAVLGCBM

              PERSIST_BASE="/persist/savlg_imagenet_runs"
              RUN_STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
              RUN_DIR="${PERSIST_BASE}/${RUN_STAMP}_${HOSTNAME:-pod}"
              mkdir -p "${RUN_DIR}/logs" "${RUN_DIR}/saved_models"
              touch "${RUN_DIR}/.write_test"
              rm -f "${RUN_DIR}/.write_test"
              exec > >(tee -a "${RUN_DIR}/logs/entrypoint.log") 2>&1
              echo "[train] artifact run dir: ${RUN_DIR}"
              cp -f configs/unified/imagenet_savlg_cbm.json "${RUN_DIR}/run_config.json"
              if command -v git >/dev/null 2>&1; then
                git -C /work/SAVLGCBM rev-parse HEAD > "${RUN_DIR}/git_commit.txt" || true
              fi

              sync_models_to_pvc() {
                if [[ -d /work/out/saved_models ]]; then
                  cp -au /work/out/saved_models/. "${RUN_DIR}/saved_models/" || true
                fi
              }

              periodic_sync() {
                while true; do
                  sleep 300
                  sync_models_to_pvc
                done
              }
              periodic_sync &
              SYNC_PID="$!"
              cleanup() {
                status=$?
                if [[ -n "${SYNC_PID:-}" ]]; then
                  kill "${SYNC_PID}" 2>/dev/null || true
                  wait "${SYNC_PID}" 2>/dev/null || true
                fi
                sync_models_to_pvc
                echo "${status}" > "${RUN_DIR}/exit_code.txt"
              }
              trap cleanup EXIT

              source /opt/conda/etc/profile.d/conda.sh
              export MKL_INTERFACE_LAYER=GNU
              if ! conda env list | awk '{print $1}' | grep -qx cbm; then
                echo "Expected prebuilt conda env 'cbm' in image, but it was not found." >&2
                exit 5
              fi
              conda activate cbm

              if [[ ! -d /data/root/imagenet_annotations ]]; then
                echo "Missing /data/root/imagenet_annotations (expected from stage-data)." >&2
                exit 4
              fi
              if [[ -z "$(ls -A /data/root/imagenet_annotations 2>/dev/null)" ]]; then
                echo "/data/root/imagenet_annotations is empty (staging failed)." >&2
                exit 4
              fi

              mkdir -p /work/out/saved_models /work/out/saved_activations

              python -u train_cbm.py \
                --config configs/unified/imagenet_savlg_cbm.json \
                --annotation_dir /data/root/imagenet_annotations \
                --activation_dir /work/out/saved_activations \
                --save_dir /work/out/saved_models \
                --disable_activation_cache \
                --savlg_stream_supervision \
                --cbl_epochs 1 \
                --cbl_batch_size 1024 \
                --num_workers 8 \
                --spatial_num_workers 8 \
                --prompt_batch_size 1024 \
                --savlg_supervision_source gdino \
                --savlg_residual_spatial_alpha 0.8

              sync_models_to_pvc
              echo "[train] training finished successfully"
          resources:
            requests:
              cpu: "100"
              memory: "64Gi"
              nvidia.com/a100: "1"
              ephemeral-storage: "500Gi"
            limits:
              cpu: "100"
              memory: "64Gi"
              nvidia.com/a100: "1"
              ephemeral-storage: "500Gi"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: work
              mountPath: /work
            - name: artifacts-pvc
              mountPath: /persist
            - name: dev-shm
              mountPath: /dev/shm
