apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-imagenet-full-glm-rerun-eval
  namespace: wenglab-interpretable-ai
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: savlg-imagenet-full-glm-rerun-eval
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A10

      initContainers:
        - name: clone-repo
          image: alpine/git:2.45.2
          command: ["sh", "-lc"]
          env:
            - name: REPO_URL
              value: "https://github.com/AtharvRN/SAVLGCBM.git"
            - name: REPO_REF
              value: "imagenet-training"
          args:
            - |
              set -euo pipefail
              git clone --depth 1 --branch "${REPO_REF}" "${REPO_URL}" /work/SAVLGCBM
              echo "[clone-repo] commit $(git -C /work/SAVLGCBM rev-parse --short HEAD)"
              test -f /work/SAVLGCBM/scripts/eval_savlg_imagenet_standalone_val_tar.py
              chmod -R a+rX /work/SAVLGCBM
          volumeMounts:
            - name: work
              mountPath: /work
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "2Gi"

      containers:
        - name: eval
          image: ghcr.io/atharvrn/savlgcbm-cbm:pt222-cu121
          command: ["bash", "-lc"]
          env:
            - name: MKL_INTERFACE_LAYER
              value: GNU
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: TORCH_HOME
              value: /persist/torch_home
          args:
            - |
              set -euo pipefail
              cd /work/SAVLGCBM
              source /opt/conda/etc/profile.d/conda.sh
              conda activate cbm

              RUN_BASE=/persist/savlg_imagenet_standalone_runs
              ARTIFACT_DIR="$(cat "${RUN_BASE}/LATEST_RUN_FULL_GLM_RERUN.txt")"
              SOURCE_RUN_DIR="${ARTIFACT_DIR}"
              if [[ -f "${ARTIFACT_DIR}/source_run_dir.txt" ]]; then
                SOURCE_RUN_DIR="$(cat "${ARTIFACT_DIR}/source_run_dir.txt")"
              fi
              test -d "${ARTIFACT_DIR}"
              test -d "${SOURCE_RUN_DIR}"
              test -f "${SOURCE_RUN_DIR}/concept_head_best.pt"
              test -f "${SOURCE_RUN_DIR}/concepts.txt"
              test -f "${ARTIFACT_DIR}/final_layer_glm_saga.pt"
              test -f "${ARTIFACT_DIR}/final_layer_normalization.pt"
              test -f /workspace/imagenet_downloads/ILSVRC2012_img_val.tar
              test -f /workspace/imagenet_eval_devkit/data/meta.mat
              test -f /workspace/imagenet_eval_devkit/data/ILSVRC2012_validation_ground_truth.txt
              echo "[eval] artifact_dir=${ARTIFACT_DIR}"
              echo "[eval] source_run_dir=${SOURCE_RUN_DIR}"

              python -u scripts/eval_savlg_imagenet_standalone_val_tar.py \
                --artifact_dir "${ARTIFACT_DIR}" \
                --val_tar /workspace/imagenet_downloads/ILSVRC2012_img_val.tar \
                --devkit_dir /workspace/imagenet_eval_devkit \
                --output_json "${ARTIFACT_DIR}/full_val_eval_from_workspace_tar.json" \
                --batch_size 64 \
                --device cuda \
                --log_every 1000
          volumeMounts:
            - name: work
              mountPath: /work
            - name: scratch-pvc
              mountPath: /persist
            - name: rwx-pvc
              mountPath: /workspace
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "8"
              memory: "32Gi"
            limits:
              nvidia.com/gpu: "1"
              cpu: "8"
              memory: "32Gi"

      volumes:
        - name: work
          emptyDir: {}
        - name: scratch-pvc
          persistentVolumeClaim:
            claimName: atharv-rwo-scratch-2ti
        - name: rwx-pvc
          persistentVolumeClaim:
            claimName: atharv-rwx-storage-1ti
