apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-imagenet-smoke-epoch1-eval
  namespace: wenglab-interpretable-ai
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: savlg-imagenet-smoke-epoch1-eval
    spec:
      restartPolicy: Never
      containers:
      - name: main
        image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-devel
        command: ["bash", "-lc"]
        args:
        - |
          set -euxo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export OMP_NUM_THREADS=1
          export MKL_NUM_THREADS=1
          export OPENBLAS_NUM_THREADS=1
          export NUMEXPR_NUM_THREADS=1
          export PYTHONUNBUFFERED=1

          export CBM_MIN_IMAGE_BYTES=1024
          export CBM_FALLBACK_IMAGE_SIZE=224
          export IMAGENET_TRAIN_ROOT=/scratch/imagenet_extract_runs_fresh/20260420_135422/train

          export RUN_DIR=/scratch/savlgcbm_artifacts/saved_models_imagenet_smoke/savlg_cbm_imagenet_2026_04_21_04_26_10
          export OUT_JSON="$RUN_DIR/imagenet_smoke_eval_summary.json"

          apt-get update || true
          apt-get install -y --no-install-recommends git curl wget libgl1 libglib2.0-0 || true

          # Minimal deps for evaluation (avoid pulling torch/torchvision again).
          python -m pip install --upgrade pip
          python -m pip install \
            pandas==2.3.3 numpy==1.26.4 matplotlib tqdm loguru pytorchcv ftfy regex scikit-learn tensorboard opencv-python-headless==4.11.0.86

          cd /workspace/SAVLGCBM
          export PYTHONPATH=/workspace/SAVLGCBM

          python - <<'PY'
          import argparse
          import json
          import os
          import torch
          from torch.utils.data import DataLoader

          from methods.savlg import (
              create_savlg_splits,
              build_savlg_concept_layer,
              forward_savlg_backbone,
              forward_savlg_concept_layer,
              compute_savlg_concept_logits,
          )

          run_dir = os.environ["RUN_DIR"]
          out_json = os.environ["OUT_JSON"]

          with open(os.path.join(run_dir, "args.txt"), "r") as f:
              args = json.load(f)
          args = argparse.Namespace(**args)
          args.device = "cuda" if torch.cuda.is_available() else "cpu"
          args.use_activation_cache = False  # deterministic + avoid needing caches for this smoke

          # Build datasets; for this smoke run test_dataset == val_dataset (skip_test_eval was used).
          _, _, train_ds, val_ds, test_ds, backbone = create_savlg_splits(args)

          with open(os.path.join(run_dir, "concepts.txt"), "r") as f:
              concepts = [c for c in f.read().split("\n") if c]

          concept_layer = build_savlg_concept_layer(args, backbone, len(concepts))
          concept_layer.load_state_dict(torch.load(os.path.join(run_dir, "concept_layer.pt"), map_location=args.device))
          concept_layer.to(args.device).eval()

          W = torch.load(os.path.join(run_dir, "W_g.pt"), map_location="cpu")
          b = torch.load(os.path.join(run_dir, "b_g.pt"), map_location="cpu")
          mean = torch.load(os.path.join(run_dir, "proj_mean.pt"), map_location="cpu")
          std = torch.load(os.path.join(run_dir, "proj_std.pt"), map_location="cpu")
          num_classes = int(W.shape[0])
          final = torch.nn.Linear(W.shape[1], num_classes, bias=True)
          final.load_state_dict({"weight": W, "bias": b})
          final.to(args.device).eval()

          def eval_topk(ds, k=5):
              loader = DataLoader(ds, batch_size=args.cbl_batch_size, shuffle=False, num_workers=args.num_workers)
              total = 0
              top1 = 0
              topk = 0
              with torch.no_grad():
                  for images, target in loader:
                      images = images.to(args.device)
                      target = target.to(args.device)
                      feats = forward_savlg_backbone(backbone, images, args)
                      global_out, spatial_maps = forward_savlg_concept_layer(concept_layer, feats)
                      _, _, final_logits = compute_savlg_concept_logits(global_out, spatial_maps, args)
                      final_logits = (final_logits - mean.to(args.device)) / std.to(args.device)
                      logits = final(final_logits)
                      pred1 = logits.argmax(dim=-1)
                      top1 += int((pred1 == target).sum().item())
                      if k > 1:
                          predk = logits.topk(k, dim=-1).indices
                          topk += int((predk == target[:, None]).any(dim=1).sum().item())
                      total += int(target.numel())
              return {"n": total, "top1": top1 / max(total, 1), f"top{k}": topk / max(total, 1) if k > 1 else None}

          # "test" is the held-out split used by NEC (val split from train for this smoke run).
          full_metrics = {
              "train": eval_topk(train_ds, k=5),
              "val": eval_topk(val_ds, k=5),
              "test": eval_topk(test_ds, k=5),
          }

          payload = {
              "run_dir": run_dir,
              "splits": {k: v["n"] for k, v in full_metrics.items()},
              "full_model": full_metrics,
          }

          with open(out_json, "w") as f:
              json.dump(payload, f, indent=2)
          print("WROTE", out_json)
          print(json.dumps(payload, indent=2))
          PY

          # NEC / AvgAcc sweep (prints ACC@5 and AVGACC implicitly; writes metrics.csv).
          python -u sparse_evaluation.py --load_path "$RUN_DIR"
        resources:
          requests:
            nvidia.com/gpu: 1
            cpu: "12"
            memory: 48Gi
          limits:
            nvidia.com/gpu: 1
            cpu: "12"
            memory: 48Gi
        volumeMounts:
        - name: atharv-rwx-storage-1ti
          mountPath: /workspace
        - name: atharv-rwo-scratch-2ti
          mountPath: /scratch
        - name: dev-shm
          mountPath: /dev/shm
      volumes:
      - name: atharv-rwx-storage-1ti
        persistentVolumeClaim:
          claimName: atharv-rwx-storage-1ti
      - name: atharv-rwo-scratch-2ti
        persistentVolumeClaim:
          claimName: atharv-rwo-scratch-2ti
      - name: dev-shm
        emptyDir:
          medium: Memory
          sizeLimit: 16Gi
