apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-alpha-sweep-r18-2gpu-loc
  namespace: wenglab-interpretable-ai
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: savlg-alpha-sweep-r18-2gpu-loc
    spec:
      restartPolicy: Never
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A10
        nautilus.io/Institution: University_of_NebraskaLincoln
      containers:
        - name: main
          image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-devel
          command:
            - bash
            - -lc
          args:
            - |
              set -euxo pipefail
              export DEBIAN_FRONTEND=noninteractive
              export OMP_NUM_THREADS=1
              export MKL_NUM_THREADS=1
              export OPENBLAS_NUM_THREADS=1
              export NUMEXPR_NUM_THREADS=1
              export PYTHONUNBUFFERED=1

              source /opt/conda/etc/profile.d/conda.sh || true

              LOG_DIR=/workspace/SAVLGCBM/logs
              SAVE_ROOT=/workspace/SAVLGCBM/saved_models/alpha_sweep_r18
              OUT_ROOT=/workspace/SAVLGCBM/results/alpha_sweep_r18_loc
              mkdir -p "$LOG_DIR" "$OUT_ROOT"

              apt-get update || true
              apt-get install -y --no-install-recommends git curl wget rsync libgl1 libglib2.0-0 || true

              cd /workspace/SAVLGCBM

              bash scripts/pod_bootstrap_cbm.sh \
                2>&1 | tee "$LOG_DIR/bootstrap_cbm_savlg_alpha_sweep_loc_2gpu.log"

              source /opt/conda/etc/profile.d/conda.sh
              conda activate cbm

              export PYTHONPATH=/workspace/SAVLGCBM
              mkdir -p /root/.torch/models
              echo "[$(date)] warming resnet18_cub backbone cache" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_loc_2gpu.log"
              python - <<'PY'
              from data import utils as data_utils
              _model, _ = data_utils.get_target_model("resnet18_cub", "cpu")
              print("warmed resnet18_cub")
              PY

              run_loc() {
                local gpu="$1"
                local alpha="$2"
                local tag
                tag="$(echo "$alpha" | tr '.' 'p')"
                local alpha_root="$SAVE_ROOT/alpha_${tag}"
                local run_dir
                local log_file="$LOG_DIR/loc_savlg_alpha_${tag}_2gpu_job.log"
                local out_file="$OUT_ROOT/loc_savlg_alpha_${tag}.json"

                if [ ! -d "$alpha_root" ]; then
                  echo "missing alpha_root=$alpha_root" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_loc_2gpu.log"
                  return 1
                fi

                run_dir="$(find "$alpha_root" -maxdepth 1 -mindepth 1 -type d | sort | tail -n 1)"

                if [ -z "$run_dir" ]; then
                  echo "no nested run dir under alpha_root=$alpha_root" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_loc_2gpu.log"
                  return 1
                fi

                if [ ! -f "$run_dir/artifacts.json" ] && [ ! -f "$run_dir/args.txt" ]; then
                  echo "invalid run_dir=$run_dir (missing artifacts.json/args.txt)" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_loc_2gpu.log"
                  return 1
                fi

                echo "[$(date)] starting localization alpha=$alpha on gpu=$gpu run_dir=$run_dir" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_loc_2gpu.log"

                CUDA_VISIBLE_DEVICES="$gpu" python -u scripts/evaluate_savlg_native_maps.py \
                  --load_path "$run_dir" \
                  --annotation_dir /workspace/SAVLGCBM/annotations \
                  --output "$out_file" \
                  --map_normalization concept_zscore_minmax \
                  --activation_thresholds 0.05,0.1,0.15,0.2,0.25,0.3,0.35,0.4,0.45,0.5,0.55,0.6,0.65,0.7,0.75,0.8,0.85,0.9,0.95 \
                  --box_iou_thresholds 0.1,0.3,0.5,0.7 \
                  --eval_subset_mode gt_present \
                  --batch_size 128 \
                  --num_workers 8 \
                  2>&1 | tee "$log_file"

                local exit_code=$?
                echo "[$(date)] finished localization alpha=$alpha on gpu=$gpu exit=$exit_code" | tee -a "$LOG_DIR/savlg_alpha_sweep_r18_loc_2gpu.log"
                return "$exit_code"
              }

              run_loc 0 0 &
              pid0=$!
              run_loc 1 0.05 &
              pid1=$!
              wait "$pid0"
              wait "$pid1"

              run_loc 0 0.1 &
              pid2=$!
              run_loc 1 0.2 &
              pid3=$!
              wait "$pid2"
              wait "$pid3"

              run_loc 0 0.4 &
              pid4=$!
              run_loc 1 0.6 &
              pid5=$!
              wait "$pid4"
              wait "$pid5"

              run_loc 0 0.8 &
              pid6=$!
              run_loc 1 1.0 &
              pid7=$!
              wait "$pid6"
              wait "$pid7"
          resources:
            requests:
              nvidia.com/gpu: 2
              cpu: "24"
              memory: 64Gi
              ephemeral-storage: 50Gi
            limits:
              nvidia.com/gpu: 2
              cpu: "24"
              memory: 64Gi
              ephemeral-storage: 50Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: atharv-rwx-storage-1ti
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
