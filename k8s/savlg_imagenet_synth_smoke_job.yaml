apiVersion: batch/v1
kind: Job
metadata:
  name: savlg-imagenet-synth-smoke-1ep
  namespace: wenglab-interpretable-ai
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        job-name: savlg-imagenet-synth-smoke-1ep
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: hcc-gpengine-shor-c5303.unl.edu
      tolerations:
        - key: "nautilus.io/issue"
          operator: "Equal"
          value: "1663"
          effect: "NoSchedule"

      initContainers:
        - name: clone-repo
          image: alpine/git:2.45.2
          command: ["sh", "-lc"]
          env:
            - name: REPO_URL
              value: "https://github.com/AtharvRN/SAVLGCBM.git"
            - name: REPO_REF
              value: "imagenet-training"
          args:
            - |
              set -euo pipefail
              git clone --depth 1 --branch "${REPO_REF}" "${REPO_URL}" /work/SAVLGCBM
              mkdir -p /work/out
              chmod 777 /work /work/out
              chmod -R a+rX /work/SAVLGCBM
          volumeMounts:
            - name: work
              mountPath: /work
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "2Gi"

      containers:
        - name: train
          image: ghcr.io/atharvrn/savlgcbm-cbm:pt222-cu121
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              cd /work/SAVLGCBM

              source /opt/conda/etc/profile.d/conda.sh
              export MKL_INTERFACE_LAYER=GNU
              if ! conda env list | awk '{print $1}' | grep -qx cbm; then
                echo "Expected prebuilt conda env 'cbm' in image, but it was not found." >&2
                exit 5
              fi
              conda activate cbm

              python -u - <<'PY'
              import json
              from pathlib import Path
              import numpy as np
              from PIL import Image

              dataset_root = Path("/data/smoke_dataset/ILSVRC/Data/CLS-LOC")
              ann_root = Path("/data/smoke_annotations")
              train_root = dataset_root / "train"
              val_root = dataset_root / "ImageNet_val"
              ann_train = ann_root / "imagenet_train"
              ann_val = ann_root / "imagenet_val"

              n_train = 1500
              n_val = 200
              n_classes = 20
              seed = 42
              box = [0.05, 0.05, 0.95, 0.95]
              score = 1.0

              for p in [train_root, val_root, ann_train, ann_val]:
                  if p.exists():
                      import shutil
                      shutil.rmtree(p)
                  p.mkdir(parents=True, exist_ok=True)

              class_names = [f"n{i:08d}" for i in range(n_classes)]
              for cname in class_names:
                  (train_root / cname).mkdir(parents=True, exist_ok=True)
                  (val_root / cname).mkdir(parents=True, exist_ok=True)

              concepts_file = Path("concept_files/imagenet_filtered.txt")
              concept = "\"Police\" or \"Sheriff\" markings"
              if concepts_file.is_file():
                  for line in concepts_file.read_text().splitlines():
                      line = line.strip()
                      if line:
                          concept = line
                          break

              rng = np.random.default_rng(seed)

              def write_split(split_root, ann_dir, n_images, seed_offset=0):
                  relpaths = []
                  local_rng = np.random.default_rng(seed + seed_offset)
                  for idx in range(n_images):
                      cname = class_names[idx % n_classes]
                      rel = f"{cname}/img_{idx:07d}.jpg"
                      img_path = split_root / rel
                      img_path.parent.mkdir(parents=True, exist_ok=True)
                      arr = local_rng.integers(0, 256, size=(256, 256, 3), dtype=np.uint8)
                      Image.fromarray(arr, mode="RGB").save(img_path, format="JPEG", quality=90)
                      relpaths.append(rel)
                  for idx, rel in enumerate(relpaths):
                      payload = [
                          {"img_path": rel},
                          {"label": concept, "logit": score, "logits": [score], "box": box},
                      ]
                      with (ann_dir / f"{idx}.json").open("w") as f:
                          json.dump(payload, f)

              write_split(train_root, ann_train, n_train, seed_offset=0)
              write_split(val_root, ann_val, n_val, seed_offset=1)
              print(f"[smoke] prepared synthetic dataset train={n_train} val={n_val} classes={n_classes}")
              PY

              export IMAGENET_TRAIN_ROOT=/data/smoke_dataset/ILSVRC/Data/CLS-LOC/train
              export IMAGENET_VAL_ROOT=/data/smoke_dataset/ILSVRC/Data/CLS-LOC/ImageNet_val
              export CBM_MIN_IMAGE_BYTES=0
              export OMP_NUM_THREADS=1
              export MKL_NUM_THREADS=1

              mkdir -p /persist/savlg_smoke_runs /data/smoke_activations

              python -u train_cbm.py \
                --config configs/unified/imagenet_savlg_cbm.json \
                --model_name savlg_cbm \
                --dataset imagenet \
                --backbone resnet50 \
                --annotation_dir /data/smoke_annotations \
                --activation_dir /data/smoke_activations \
                --save_dir /persist/savlg_smoke_runs \
                --disable_activation_cache \
                --savlg_stream_supervision \
                --cbl_epochs 1 \
                --cbl_batch_size 64 \
                --saga_n_iters 10 \
                --saga_batch_size 256 \
                --num_workers 2 \
                --spatial_num_workers 2 \
                --max_train_images 1500 \
                --max_test_images 200 \
                --skip_train_val_eval
          volumeMounts:
            - name: work
              mountPath: /work
            - name: data
              mountPath: /data
            - name: artifacts-pvc
              mountPath: /persist
            - name: dev-shm
              mountPath: /dev/shm
          resources:
            requests:
              nvidia.com/a100: 1
              cpu: "100"
              memory: "64Gi"
              ephemeral-storage: "120Gi"
            limits:
              nvidia.com/a100: 1
              cpu: "100"
              memory: "64Gi"
              ephemeral-storage: "120Gi"

      volumes:
        - name: work
          emptyDir: {}
        - name: data
          emptyDir:
            sizeLimit: 120Gi
        - name: artifacts-pvc
          persistentVolumeClaim:
            claimName: atharv-rwo-scratch-2ti
        - name: dev-shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
