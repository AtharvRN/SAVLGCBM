name: Build CBM Docker Image

on:
  workflow_dispatch: {}
  push:
    paths:
      - docker/**
      - envs/cbm.yml
      - .github/workflows/build-cbm-image.yml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cbm
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/savlgcbm-cbm:pt222-cu121
            ghcr.io/${{ github.repository_owner }}/savlgcbm-cbm:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

